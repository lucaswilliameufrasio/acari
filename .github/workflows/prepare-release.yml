name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-prep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    if: github.ref == 'refs/heads/main'
    environment: release
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qP '^\d+\.\d+\.\d+$'; then
            echo "error: version must be in semver format (e.g., 0.2.0)"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: cargo install git-cliff --locked 2>&1 | tail -1

      - name: Generate changelog for release
        run: |
          git cliff --bump --tag "v${{ inputs.version }}" -o CHANGELOG.md

      - name: Update version in Cargo.toml
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ inputs.version }}\"/" Cargo.toml

      - name: Regenerate Cargo.lock after version bump
        run: cargo generate-lockfile

      - name: Create release PR via gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: release/v${{ inputs.version }}-rc.${{ github.run_attempt }}
          TITLE: Release v${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "chore(release): prepare for v${{ inputs.version }}"

          git push origin HEAD:"$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "Automated release preparation for **v${{ inputs.version }}**.

          ## After merging

          Create and push the tag to trigger the build and release:

          \`\`\`bash
          git tag v${{ inputs.version }}
          git push origin v${{ inputs.version }}
          \`\`\`

          The \`Release\` workflow will build artifacts, generate installers, and create the GitHub Release."
